services:

  env-base:
    image: ${REGISTRY}/inginious/env-base:${VERSION}
    build:
      context: base-containers/base/
      args:
        - VERSION=${VERSION}
        - REGISTRY=${REGISTRY}
    command: /bin/true

  env-default:
    image: ${REGISTRY}/inginious/env-default:${VERSION}
    build:
      context: base-containers/default/
      args:
        - VERSION=${VERSION}
        - REGISTRY=${REGISTRY}
    depends_on:
      - env-base
    command: /bin/true

  env-python3:
    image: ${REGISTRY}/inginious/env-python3:${VERSION}
    command: /bin/true

  base:
    image: ${REGISTRY}/inginious/core-base:${VERSION}
    build:
      dockerfile: deploy/inginious-base.containerfile
      args:
        - VERSION=${VERSION}
        - REGISTRY=${REGISTRY}
    command: /bin/true

  db:
    image: mongo:8.3.4
    volumes:
      - ./deploy/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js
      - ./mongo:/data
    environment:
      MONGO_INITDB_DATABASE: "INGInious"

      # MANDATORY ARGUMENT, INITIALISATION WILL FAIL IF NOT PROVIDED.
      # Output of 'echo -n "superadmin" | argon2  ASUPERSECURESALT -id -t 3 -m 16 -l 64 -e'.
      # $ are doubled because of variable expansion in compose env var.
      INGINIOUS_SUPERADMIN_PASSWORD: '$$argon2id$$v=19$$m=65536,t=3,p=1$$QVNVUEVSU0VDVVJFU0FMVA$$NpeSDEsx+FwrIS277T9o/Q4z4Ypicibs3LiLZrftXsBUmBxFnK8FKa45w5q85ewM+dOlzZPMFdAmxpmDVAmLlQ'

      # Username. Defaults to "superadmin" if not provided.
      INGINIOUS_SUPERADMIN_USERNAME: "superadmin"

      # Real name. Defaults to "INGInious superadmin" if not provided.
      INGINIOUS_SUPERADMIN_REALNAME: "INGInious superadmin"

      # Email. Defaults to "superadmin@inginious.org" if not provided.
      INGINIOUS_SUPERADMIN_EMAIL: "superadmin@inginious.org"

      # Optionnal superadmin language
      # INGINIOUS_SUPERADMIN_LANG: "en"
      #
      # Optionnal superadmin code indentation
      # INGINIOUS_SUPERADMIN_INDENT: "4"
    networks:
      - inginious

  backend:
    image: ${REGISTRY}/inginious/core-backend:${VERSION}
    depends_on:
      - base
    build:
      dockerfile: deploy/backend.containerfile
      args:
        - VERSION=${VERSION}
        - REGISTRY=${REGISTRY}
    environment:
      AGENT: "tcp://0.0.0.0:2001"
      CLIENT: "tcp://0.0.0.0:2000"
    networks:
      - inginious

  agent-docker:
    image: ${REGISTRY}/inginious/core-agent_docker:${VERSION}
    depends_on:
      - backend
    deploy:
      replicas: 1
    build:
      dockerfile: deploy/agent-docker.containerfile
      args:
        - VERSION=${VERSION}
        - REGISTRY=${REGISTRY}
    environment:
      BACKEND: "tcp://backend:2001"
    volumes:
     - /var/run/docker.sock:/var/run/docker.sock
     # See https://github.com/INGInious/INGInious/issues/352
     - ./tasks/:/inginious/tasks
     # See https://github.com/INGInious/INGInious/issues/799
     - /tmp/agent_data/:/tmp/agent_data/
    networks:
      - inginious

  agent-mcq:
    image: ${REGISTRY}/inginious/core-agent_mcq:${VERSION}
    depends_on:
      - backend
    deploy:
      replicas: 1
    build:
      dockerfile: deploy/agent-mcq.containerfile
      args:
        - VERSION=${VERSION}
        - REGISTRY=${REGISTRY}
    environment:
      BACKEND: "tcp://backend:2001"
    volumes:
     # See https://github.com/INGInious/INGInious/issues/352
     - ./tasks/:/inginious/tasks
     # See https://github.com/INGInious/INGInious/issues/799
     - /tmp/agent_data/:/tmp/agent_data/
    networks:
      - inginious

  frontend:
    image: ${REGISTRY}/inginious/core-frontend:${VERSION}
    build:
      dockerfile: deploy/frontend.containerfile
      args:
        - VERSION=${VERSION}
        - REGISTRY=${REGISTRY}
    depends_on:
      - db
      - backend
      - agent-docker
      - agent-mcq
      - env-base
      - env-default
      - env-python3
    environment:
      - INGINIOUS_WEBAPP_HOST=0.0.0.0
    volumes:
      - ./configuration.deploy.yaml:/inginious/configuration.yaml
      - ./tasks/:/inginious/tasks
    networks:
      - inginious

  webdav:
    image: ${REGISTRY}/inginious/core-webdav:${VERSION}
    build:
      dockerfile: deploy/webdav.containerfile
      args:
        - VERSION=${VERSION}
        - REGISTRY=${REGISTRY}
    environment:
      - INGINIOUS_WEBDAV_HOST=0.0.0.0
    volumes:
      - ./configuration.deploy.yaml:/inginious/configuration.yaml
      - ./tasks/:/inginious/tasks
    networks:
      - inginious

  caddy:
    image: docker.io/library/caddy:2.11.4-alpine
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - frontend
      - webdav
    ports:
      - 443:443
    # For illustration purpose, not useful in real deployments.
    networks:
      inginious:
        aliases:
          - inginious.local

networks:
  inginious:
