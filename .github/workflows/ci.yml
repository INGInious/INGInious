# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [ main, v0.9.x ]
  pull_request:
    branches: [ main, v0.9.x ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:

  build_and_deploy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Start services
        run: |
          sudo systemctl start docker

      - name: Build core services
        run: |
          docker build -t ghcr.io/inginious/core-base:latest -f deploy/inginious-base.containerfile .
          docker build -t ghcr.io/inginious/core-frontend:latest -f deploy/frontend.containerfile .
          docker build -t ghcr.io/inginious/core-backend:latest -f deploy/backend.containerfile .
          docker build -t ghcr.io/inginious/core-agent_mcq:latest -f deploy/agent-mcq.containerfile .
          docker build -t ghcr.io/inginious/core-agent_docker:latest -f deploy/agent-docker.containerfile .

      - name: Build base environments
        run: |
          docker build -t ghcr.io/inginious/env-base:latest -f base-containers/base/Dockerfile base-containers/base
          docker build -t ghcr.io/inginious/env-default:latest -f base-containers/default/Dockerfile base-containers/default
          # Quick hack, we do not launch any actual task.
          docker tag ghcr.io/inginious/env-base:latest ghcr.io/inginious/env-python3:latest

      - name: Test deployment
        id: deploy
        run: |
          docker compose up --wait --wait-timeout 60
        timeout-minutes: 2
        continue-on-error: true

      - name: Compose logs on failure
        if: steps.deploy.outcome == 'failure'
        run: |
          docker compose logs
          exit 1

  compose_build_and_deploy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Start services
        run: |
          sudo systemctl start docker

      - name: Test deployment
        id: deploy
        run: docker compose up --build --wait --wait-timeout 600
        timeout-minutes: 15
        continue-on-error: true
        
      - name: Compose logs on failure
        if: steps.deploy.outcome == 'failure'
        run: |
          docker compose logs
          exit 1

  tests:

    strategy:
      # Ensure that each python version will be tested even if one of them fails.
      fail-fast: false
      matrix:
        python_version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    runs-on: ubuntu-24.04
    services:
      mongo:
        image: mongo
        ports:
          - 27017:27017

    steps:

      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python_version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python_version }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libtidy5deb1 libzmq3-dev

      - name: Start services
        run: |
          sudo systemctl start docker

      - name: Install INGInious
        run: |
          pip3 install .
          pip3 install .[test]

      - name: Launch pytest tests
        run: coverage run -a --branch -m pytest -v

      - name: Launch pytest tests not requiring INGInious modules
        run: |
          python3 -m venv env
          env/bin/pip3 install jinja2==3.1.3 pytest==8.0.0 coverage==7.4.1
          env/bin/coverage run --branch -m pytest -v inginious/scripts/task_tester

      - name: Generate coverage report
        # Launch even if one of the two test jobs fails
        if: always()
        run: |
          coverage report --include="inginious/*"
          coverage xml --include="inginious/*"

      - name: Save coverage output
        uses: codacy/codacy-coverage-reporter-action@v1
        if: ${{ github.event_name == 'push' }}
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage.xml
